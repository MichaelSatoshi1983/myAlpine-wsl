name: build-alpine-wsl

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget tar

      - name: make scripts executable
        run: |
          chmod +x scripts/build.sh
          chmod +x scripts/setup.sh

      - name: build alpine rootfs
        run: sudo ./scripts/build.sh

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-wsl
          path: alpine-wsl.tar.gz

      - name: generate release tag
        id: tag
        run: |
          echo "tag=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Alpine WSL ${{ steps.tag.outputs.tag }}
          files: alpine-wsl.tar.gz
